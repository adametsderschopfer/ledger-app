<section class="page-heading">
  <div>
    <p class="eyebrow">Кредитный контур</p>
    <h1>Кредиты</h1>
  </div>
  <button mat-flat-button type="button" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Добавить кредит
  </button>
</section>

<section class="surface">
  <div class="table-shell">
    <table mat-table [dataSource]="ledger.loans()" class="ledger-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Кредит</th>
      <td mat-cell *matCellDef="let loan">
        <strong>{{ loan.name }}</strong>
      </td>
    </ng-container>

    <ng-container matColumnDef="payment">
      <th mat-header-cell *matHeaderCellDef>Платеж</th>
      <td mat-cell *matCellDef="let loan">{{ ledger.money(loan.monthlyPayment) }}</td>
    </ng-container>

    <ng-container matColumnDef="dueDay">
      <th mat-header-cell *matHeaderCellDef>Дата</th>
      <td mat-cell *matCellDef="let loan">{{ loan.dueDay }} число</td>
    </ng-container>

    <ng-container matColumnDef="remaining">
      <th mat-header-cell *matHeaderCellDef class="numeric">Остаток</th>
      <td mat-cell *matCellDef="let loan" class="numeric">{{ ledger.money(loan.remainingAmount) }}</td>
    </ng-container>

    <ng-container matColumnDef="progress">
      <th mat-header-cell *matHeaderCellDef>Погашено</th>
      <td mat-cell *matCellDef="let loan" class="progress-cell">
        <mat-progress-bar mode="determinate" [value]="paidShare(loan.originalAmount, loan.remainingAmount)" />
        <span>{{ paidShare(loan.originalAmount, loan.remainingAmount) }}%</span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </div>
</section>
