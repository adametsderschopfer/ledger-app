<main class="login-page">
  <mat-card appearance="outlined" class="login-card">
    <mat-card-header>
      <mat-card-title>Ledger</mat-card-title>
      <mat-card-subtitle>{{ i18n.t('auth.subtitle') }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" class="login-form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="username" />
          <mat-icon matPrefix>mail</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ i18n.t('auth.password') }}</mat-label>
          <input matInput formControlName="password" type="password" autocomplete="current-password" />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        @if (loginFailed()) {
          <p class="form-error">{{ i18n.t('auth.loginError') }}</p>
        }

        <button mat-flat-button type="submit" [disabled]="loginPending()">{{ i18n.t('auth.login') }}</button>
      </form>
    </mat-card-content>
  </mat-card>
</main>
