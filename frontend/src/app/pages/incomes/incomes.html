<section class="page-heading">
  <div>
    <p class="eyebrow">{{ i18n.t('transactions.incomesEyebrow') }}</p>
    <h1>{{ i18n.t('transactions.incomesTitle') }}</h1>
  </div>
  <button mat-flat-button type="button" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    {{ i18n.t('actions.addIncome') }}
  </button>
</section>

<app-transaction-groups
  [groups]="ledger.incomeTransactionGroups()"
  [emptyText]="i18n.t('transactions.incomesEmpty')"
  [isLoading]="ledger.isLoading()"
  [hasLoaded]="ledger.hasLoaded()"
/>
