<section class="page-heading">
  <div>
    <h1>{{ i18n.t('transactions.incomesTitle') }}</h1>
  </div>
  <button mat-flat-button type="button" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    {{ i18n.t('actions.addIncome') }}
  </button>
</section>

<app-transaction-groups
  [groups]="ledger.incomeTransactionGroups()"
  [emptyText]="i18n.t('transactions.incomesEmpty')"
  [isLoading]="ledger.incomeTransactionList().isLoading"
  [hasLoaded]="ledger.incomeTransactionList().hasLoaded"
/>

@if (hasMore()) {
  <div #loadMoreAnchor class="load-more">
    <button mat-stroked-button type="button" [disabled]="isPageLoading()" (click)="loadMore()">
      <mat-icon>expand_more</mat-icon>
      {{ i18n.t('transactions.loadMore') }}
    </button>
  </div>
} @else if (ledger.incomeTransactions().length > 0) {
  <p class="list-end">{{ i18n.t('transactions.allDone') }}</p>
}
