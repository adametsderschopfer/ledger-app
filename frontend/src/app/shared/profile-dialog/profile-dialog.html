<h2 mat-dialog-title>{{ i18n.t('profile.editTitle') }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="profile-dialog">
    <section class="avatar-editor" [attr.aria-label]="i18n.t('profile.avatar')">
      <div class="avatar-preview">
        @if (avatarPreview()) {
          <img [src]="avatarPreview()" [alt]="i18n.t('profile.avatar')" />
        } @else {
          <span>{{ avatarInitial() }}</span>
        }
      </div>

      <div class="avatar-actions">
        <input #avatarFile hidden type="file" accept="image/*" (change)="selectAvatar($event)" />
        <button mat-stroked-button type="button" (click)="avatarFile.click()">
          <mat-icon>upload</mat-icon>
          {{ i18n.t('profile.uploadAvatar') }}
        </button>
        <button mat-button type="button" (click)="removeAvatar()">
          <mat-icon>delete</mat-icon>
          {{ i18n.t('profile.removeAvatar') }}
        </button>
      </div>
    </section>

    <mat-form-field appearance="outline">
      <mat-label>{{ i18n.t('server.name') }}</mat-label>
      <input matInput formControlName="name" autocomplete="name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ i18n.t('server.email') }}</mat-label>
      <input matInput formControlName="email" type="email" autocomplete="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ i18n.t('profile.avatarUrl') }}</mat-label>
      <input
        matInput
        formControlName="avatarUrl"
        type="url"
        autocomplete="off"
        (blur)="setAvatarFromUrl()"
      />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">{{ i18n.t('actions.cancel') }}</button>
  <button mat-flat-button type="button" (click)="save()">{{ i18n.t('actions.save') }}</button>
</mat-dialog-actions>
