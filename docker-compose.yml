services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:80"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5433:5432"
    volumes:
      - ledger-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      context: ./backend
      args:
        SERVICE: auth-service
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  ledger-service:
    build:
      context: ./backend
      args:
        SERVICE: ledger-service
    environment:
      PORT: "8082"
      DATABASE_URL: postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend
      args:
        SERVICE: api-gateway
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8082
    depends_on:
      auth-service:
        condition: service_started
      ledger-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  ledger-postgres:
