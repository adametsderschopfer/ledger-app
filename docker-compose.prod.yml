services:
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - ledger

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ledger-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - ledger

  auth-service:
    build:
      context: ./backend
      args:
        SERVICE: auth-service
    restart: unless-stopped
    environment:
      PORT: "8081"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:?Set DEFAULT_ADMIN_NAME in .env}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?Set DEFAULT_ADMIN_EMAIL in .env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in .env}
      DEFAULT_USER_ENABLED: ${DEFAULT_USER_ENABLED:-true}
      DEFAULT_USER_NAME: ${DEFAULT_USER_NAME:-User}
      DEFAULT_USER_EMAIL: ${DEFAULT_USER_EMAIL:-user@ledger.local}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-user}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ledger

  ledger-service:
    build:
      context: ./backend
      args:
        SERVICE: ledger-service
    restart: unless-stopped
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ledger

  api-gateway:
    build:
      context: ./backend
      args:
        SERVICE: api-gateway
    restart: unless-stopped
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8081
      LEDGER_SERVICE_URL: http://ledger-service:8082
    depends_on:
      auth-service:
        condition: service_started
      ledger-service:
        condition: service_started
    networks:
      - ledger

volumes:
  ledger-postgres:
    name: ledger-postgres

networks:
  ledger:
    name: ledger-network
